<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria — Genzie Hub ✧💖</title>
<link rel="stylesheet" href="main.css">
</head>
<body oncontextmenu="return false" ondragstart="return false">

  <div class="sparkle s1">✨</div>
  <div class="sparkle s2">💖</div>
  <div class="sparkle s3">🌸</div>
  <div class="sparkle s4">✨</div>
  <div class="sparkle s5">💕</div>

  <div id="kod-modal" onclick="zamknijKodModal()">
    <div class="kod-box" onclick="event.stopPropagation()">
      <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> zablokowane</h3>
      <p>Wpisz kod, żeby zobaczyć to zdjęcie.</p>
      <input type="text" id="kod-input" maxlength="4" inputmode="numeric" placeholder="••••" onkeydown="if(event.key==='Enter') sprawdzKod()">
      <div class="kod-error" id="kod-error"></div>
      <div class="kod-btns">
        <button class="btn-anuluj" onclick="zamknijKodModal()">anuluj</button>
        <button class="btn-ok" onclick="sprawdzKod()">odblokuj</button>
      </div>
    </div>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" onclick="event.stopPropagation()" oncontextmenu="return false" draggable="false">
  </div>

  <div class="topbar" id="topbar">
    <div class="logo">genzie hub</div>
    <div class="nav-pills" id="navPills">
      <a href="index.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>start</a>
      <a href="czlonkowie.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 20c0-3.3 3.1-6 7-6"/><path d="M14 20c0-2.2 1.8-4 4-4"/></svg>członkowie</a>
      <a href="galeria.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L6 19"/></svg>zdjęcia</a>
      <a href="spotkania.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>spotkania</a>
      <a href="informacje.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="8" r="1" fill="currentColor" stroke="none"/></svg>informacje</a>
    </div>
  </div>

  <div class="page-wrap">

    <div id="zdjecia" class="page page-content active">
      <h2>galeria zdjęć 📸✨</h2>
      <p>Najlepsze momenty i fotki ekipy 📸✨</p>

      <div class="cat-filters" id="catFilters">
        <div class="cat-btn active" data-cat="all" onclick="filtrujKategorie(this, 'all')">wszystkie</div>
        <div class="cat-btn" data-cat="1" onclick="filtrujKategorie(this, '1')">1 spotkanie</div>
        <div class="cat-btn" data-cat="2" onclick="filtrujKategorie(this, '2')">2 spotkanie</div>
        <div class="cat-btn" data-cat="3" onclick="filtrujKategorie(this, '3')">3 spotkanie</div>
      </div>

      <div class="gallery-grid" id="gallery"></div>
    </div>

  </div>

  <script>
    const topbar = document.getElementById('topbar');
    const SCROLL_THRESHOLD = 40;

    function updateTopbarOnScroll(){
      if (window.scrollY > SCROLL_THRESHOLD) {
        topbar.classList.add('collapsed');
      } else {
        topbar.classList.remove('collapsed');
      }
    }
    window.addEventListener('scroll', updateTopbarOnScroll, { passive: true });
    updateTopbarOnScroll();

    const ZDJECIA = [
      { src: 'galeria1.jpg',  tag: 'Koniec spotkania',                          cat: 1, blokada: false },
      { src: 'galeria2.jpg',  tag: 'Zdjęcie w sklepie w jakimś chińskim sklepie', cat: 1, blokada: true },
      { src: 'galeria3.jpg',  tag: 'Kfc w Złotych Tarasach',                    cat: 1, blokada: false },
      { src: 'galeria4.jpg',  tag: 'Maciek wyjeżdża do błoni',               cat: 1, blokada: true  },
      { src: 'galeria5.jpg',  tag: 'Maciek i Adaś',                             cat: 2, blokada: false },
      { src: 'galeria6.jpg',  tag: 'Tajemniczy podryw',                         cat: 2, blokada: false },
      { src: 'galeria7.jpg',  tag: 'Maciek się powiesił',                       cat: 2, blokada: false },
      { src: 'galeria8.jpg',  tag: 'Błażej lubi krzako',                               cat: 2, blokada: false },
      { src: 'galeria9.jpg',  tag: 'Stopy Maćka',                               cat: 2, blokada: true  },
      { src: 'galeria10.jpg', tag: 'S8',                                        cat: 2, blokada: false },
      { src: 'galeria11.jpg', tag: 'Maciek z Antosią',                          cat: 2, blokada: true  },
      { src: 'galeria12.jpg', tag: 'Maciek z na tle sklepu',                        cat: 2, blokada: true  },
      { src: 'galeria13.jpg', tag: 'Rozmowy w tramwaju',                        cat: 2, blokada: false },
      { src: 'galeria14.jpg', tag: 'Kochamy Błazeja',                           cat: 3, blokada: false },
      { src: 'galeria15.jpg', tag: 'Błazej jest bardzo lubiany',                          cat: 3, blokada: true  },
      { src: 'galeria16.jpg', tag: 'Słodkie 0.5',                               cat: 3, blokada: false },
      { src: 'galeria17.jpg', tag: 'Serduszko',                                 cat: 3, blokada: false },
      { src: 'galeria18.jpg', tag: 'UWU',                                       cat: 3, blokada: true },
      { src: 'galeria19.jpg', tag: 'podciąganie',                               cat: 3, blokada: true },
      { src: 'galeria20.jpg', tag: 'Słodka para',                               cat: 3, blokada: false },
      { src: 'galeria21.jpg', tag: 'Co ona słucha',                             cat: 3, blokada: false },
    ];

    const lockIconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = ZDJECIA.map((z, i) => `
        <div class="polaroid" data-cat="${z.cat}" data-blokada="${z.blokada ? 'y' : 'n'}">
          <img src="${z.src}" alt="Zdjęcie ${i + 1}" draggable="false" onclick="openLightbox(${i}, this.parentElement)">
          <div class="lock-overlay"><div class="lock-icon">${lockIconSvg}</div><span>zablokowane</span></div>
          <span class="tag">${z.tag}</span>
        </div>
      `).join('');
    }
    renderGallery();

    let currentIdx = 0;
    const images = document.querySelectorAll('#gallery img');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    const KOD_BLOKADY = '4556';
    const kodModal = document.getElementById('kod-modal');
    const kodInput = document.getElementById('kod-input');
    const kodError = document.getElementById('kod-error');
    let oczekujacyPolaroid = null;
    let oczekujacyIdx = null;

    function openLightbox(idx, polaroidEl) {
      if (polaroidEl && polaroidEl.dataset.blokada === 'y' && !polaroidEl.classList.contains('odblokowane')) {
        oczekujacyPolaroid = polaroidEl;
        oczekujacyIdx = idx;
        kodError.textContent = '';
        kodInput.value = '';
        kodModal.style.display = 'flex';
        setTimeout(() => kodInput.focus(), 50);
        return;
      }
      currentIdx = idx;
      lbImg.src = images[currentIdx].src;
      lb.style.display = 'flex';
    }

    function sprawdzKod() {
      if (kodInput.value === KOD_BLOKADY) {
        oczekujacyPolaroid.classList.add('odblokowane');
        kodModal.style.display = 'none';
        openLightbox(oczekujacyIdx, oczekujacyPolaroid);
      } else {
        kodError.textContent = 'Zły kod, spróbuj ponownie';
        kodInput.value = '';
        kodInput.focus();
      }
    }

    function zamknijKodModal() {
      kodModal.style.display = 'none';
      oczekujacyPolaroid = null;
      oczekujacyIdx = null;
    }
    function closeLightbox() { lb.style.display = 'none'; }

    function filtrujKategorie(btn, kat) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('#gallery .polaroid').forEach(p => {
        if (kat === 'all' || p.dataset.cat === kat) {
          p.classList.remove('hidden');
        } else {
          p.classList.add('hidden');
        }
      });
    }

    document.querySelectorAll('img').forEach(img => {
      img.setAttribute('draggable', 'false');
      img.addEventListener('contextmenu', e => e.preventDefault());
      img.addEventListener('dragstart', e => e.preventDefault());
    });

    document.addEventListener('contextmenu', function(e){
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    document.addEventListener('keydown', function(e){
      if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.key === 'u' || e.key === 'U')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
