<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Genzie Hub ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap');

  :root{
    --ink: #2b1642;
    --muted: #6b5487;
    --pink: #ff5fa8;
    --purple: #8c52ff;
    --lime: #b6ff3c;
    --orange: #ff9d4d;
    --mint: #6df0c2;
    --yellow: #ffe14d;
    --line: #2b1642;
    --card: #fffdf9;
    --gap: 14px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; min-height:100%; }

  body{
    font-family:'Quicksand', sans-serif;
    font-weight:500;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 12%, rgba(255,95,168,0.35), transparent 38%),
      radial-gradient(circle at 92% 8%, rgba(140,82,255,0.3), transparent 40%),
      radial-gradient(circle at 15% 88%, rgba(109,240,194,0.35), transparent 42%),
      radial-gradient(circle at 85% 75%, rgba(255,225,77,0.3), transparent 38%),
      linear-gradient(135deg, #fdeaff 0%, #d8f3ff 45%, #fff6d2 75%, #e8fff0 100%);
    background-attachment: fixed;
    min-height:100vh;
    padding: 0 0 40px;
    position:relative;
    overflow-x:hidden;
  }

  .sparkle{
    position:fixed; font-size:20px; opacity:0.55; z-index:0;
    animation: bob 5s ease-in-out infinite; pointer-events:none;
  }
  .s1{ top:6%; left:4%; }
  .s2{ top:80%; left:90%; font-size:24px; animation-delay:1s; }
  .s3{ top:40%; left:2%; font-size:16px; animation-delay:2s; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(0);} 50%{ transform:translateY(-10px) rotate(10deg);} }

  .topbar{
    max-width:520px; margin:16px auto 0;
    background: var(--card);
    border: 3px solid var(--line);
    border-radius: 100px;
    box-shadow: 5px 5px 0 var(--line);
    padding: 14px 20px;
    display:flex; align-items:center; justify-content:center;
  }
  .logo{
    font-family:'Baloo 2', sans-serif;
    font-weight:800; font-size:24px;
    color: var(--purple);
    -webkit-text-stroke: 1.2px var(--line);
    display:flex; align-items:center; gap:6px;
    text-transform:lowercase;
  }
  .logo::before{ content:"✦"; color:var(--pink); -webkit-text-stroke:0; font-size:18px; }

  .page-wrap{ max-width:520px; margin:0 auto; position:relative; z-index:1; padding: 20px 16px 0; }

  .bento{
    display:grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
  }

  .tile{
    position:relative;
    border-radius: 24px 24px 24px 8px;
    border: 3px solid var(--line);
    box-shadow: 5px 5px 0 var(--line);
    padding: 20px;
    display:flex; align-items:center; gap:14px;
    color: var(--ink);
    text-decoration:none;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    min-height:76px;
  }
  .tile:active{ transform:scale(.97); box-shadow:3px 3px 0 var(--line); }

  .tile-messenger{ background:linear-gradient(145deg, var(--pink), #ff8ec4); color:#fff; }
  .tile-instagram{ background:linear-gradient(135deg, #833AB4, #C13584, #FD1D1D); color:#fff; }
  .tile-tiktok{ background:linear-gradient(145deg, #1a1a2e, #2d2d44); color:#fff; }
  .tile-spotify{ background:linear-gradient(145deg, #1db954, var(--mint)); }

  .tile .icon-wrap{
    flex-shrink:0;
    width:46px; height:46px; border-radius:14px;
    background:rgba(255,255,255,0.92);
    border:2.5px solid var(--line);
    box-shadow:3px 3px 0 var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  .tile .icon-wrap svg{ width:24px; height:24px; display:block; color:var(--ink); }

  .tile .label{
    font-family:'Baloo 2', sans-serif;
    font-weight:700; font-size:18px;
    line-height:1.15;
  }
  .tile .sub{ font-size:12px; font-weight:600; opacity:0.9; margin-top:2px; }

  @media (prefers-reduced-motion:reduce){
    .sparkle{ animation:none; }
  }
</style>
</head>
