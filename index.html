<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genzie Messenger Hub</title>
    <style>
        /* Główne style - Kafelkowy styl Metro UI */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2e3b2e;
            color: white;
            margin: 0;
            padding: 40px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 40px;
        }

        .sidebar h1 {
            font-weight: 300;
            font-size: 40px;
            margin: 0 0 30px 0;
            line-height: 1;
        }

        .nav-link {
            cursor: pointer;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.2s;
            text-transform: lowercase;
            user-select: none;
        }

        .nav-link:hover { color: rgba(255, 255, 255, 0.8); }
        .nav-link.active { color: white; font-weight: 600; }

        .content {
            flex: 1;
            padding-left: 40px;
            overflow-y: auto;
        }

        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .metro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 160px));
            grid-auto-rows: 160px;
            gap: 10px;
            max-width: 1000px;
        }

        .tile {
            background-color: #8cbd8c;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .tile:hover { transform: scale(1.03); outline: 3px solid rgba(255,255,255,0.5); }
        .tile-large { grid-column: span 2; grid-row: span 2; }
        .tile-wide { grid-column: span 2; }
        .tile-tall { grid-row: span 2; }

        .bg-dark-green { background-color: #5a9c5a; }
        .bg-blue { background-color: #2b5797; }
        .bg-purple { background-color: #603cba; }
        .bg-orange { background-color: #da532c; }
        .bg-teal { background-color: #00aba9; }
        .bg-ig { background-color: #833AB4; }

        .tile-google {
            background-color: white;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }
        .google-logo { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #EA4335; }
        .google-logo span:nth-child(3) { color: #FBBC05; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #EA4335; }

        .tile-google form { width: 100%; display: flex; gap: 5px; }
        .tile-google input {
            flex: 1;
            padding: 8px;
            border: 2px solid #ddd;
            outline: none;
        }
        .tile-google button {
            background: #8cbd8c;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
        }

        .page-content { max-width: 1000px; font-size: 18px; line-height: 1.6; padding-bottom: 40px; }
        .page-content h2 { font-weight: 300; font-size: 36px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-top: 0; }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .member-card {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .member-card:hover {
            border-color: #8cbd8c;
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .member-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            background-color: #5a9c5a;
            margin-bottom: 15px;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .member-card h3 { margin: 0 0 5px 0; font-size: 22px; font-weight: 600; }
        .member-card p { margin: 0; font-size: 14px; opacity: 0.7; }

        @media (max-width: 768px) {
            body { flex-direction: column; padding: 15px; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; padding-right: 0; margin-bottom: 20px; display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }
            .sidebar h1 { width: 100%; font-size: 32px; margin-bottom: 10px; text-align: center; }
            .nav-link { font-size: 16px; padding: 5px 10px; border-radius: 5px; flex-grow: 1; text-align: center; }
            .nav-link.active { background-color: rgba(255, 255, 255, 0.1); }
            .content { padding-left: 0; overflow-y: visible; }
            .metro-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); grid-auto-rows: 140px; }
            .tile-wide { grid-column: span 1; }
            .tile-google form { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>genzie<br>hub</h1>
        <div class="nav-link active" onclick="switchPage(this, 'home')">start</div>
        <div class="nav-link" onclick="switchPage(this, 'kim-jestesmy')">członkowie</div>
    </div>

    <div class="content">
        <div id="home" class="page active">
            <div class="metro-grid">
                <!-- Google -->
                <div class="tile tile-wide tile-google">
                    <div class="google-logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
                    <form action="https://www.google.com/search" method="GET" target="_blank">
                        <input type="text" name="q" placeholder="Szukaj..." required>
                        <button type="submit">Szukaj</button>
                    </form>
                </div>

                <!-- Messenger -->
                <a href="LINK_MESSENGER" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="tile tile-wide bg-blue">
                        <div style="font-size: 24px; margin-bottom: 5px;">MESSENGER</div>
                        <div style="font-size: 14px; opacity: 0.8;">Ostatnia wiadomość...</div>
                    </div>
                </a>

                <!-- TikTok -->
                <a href="LINK_TIKTOK" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="tile tile-wide" style="background-color: #000;">
                        <div style="font-size: 32px; margin-bottom: auto;">🎵</div>
                        <div style="font-size: 18px;">TikTok</div>
                    </div>
                </a>

                <!-- Instagram -->
                <a href="LINK_INSTAGRAM" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="tile tile-wide bg-ig">
                        <div style="font-size: 32px; margin-bottom: auto;">📸</div>
                        <div style="font-size: 18px;">Instagram</div>
                    </div>
                </a>
            </div>
        </div>

        <div id="kim-jestesmy" class="page page-content">
            <h2>Członkowie Grupy</h2>
            <div class="members-grid">
                <div class="member-card">
                    <h3>Martyna</h3>
                    <p>Rzetelny administrator</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchPage(el, pageId) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
