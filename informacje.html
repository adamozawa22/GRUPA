<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informacje — Genzie Hub</title>
<link rel="stylesheet" href="main.css">
</head>
<body oncontextmenu="return false" ondragstart="return false">

  <div class="sparkle s1">✨</div>
  <div class="sparkle s2">💖</div>
  <div class="sparkle s3">🌸</div>
  <div class="sparkle s4">✨</div>
  <div class="sparkle s5">💕</div>

  <div id="kod-modal" onclick="zamknijKodModal()">
    <div class="kod-box" onclick="event.stopPropagation()">
      <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> zablokowane</h3>
      <p>Wpisz kod, żeby zobaczyć to zdjęcie.</p>
      <input type="text" id="kod-input" maxlength="4" inputmode="numeric" placeholder="••••" onkeydown="if(event.key==='Enter') sprawdzKod()">
      <div class="kod-error" id="kod-error"></div>
      <div class="kod-btns">
        <button class="btn-anuluj" onclick="zamknijKodModal()">anuluj</button>
        <button class="btn-ok" onclick="sprawdzKod()">odblokuj</button>
      </div>
    </div>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" onclick="event.stopPropagation()" oncontextmenu="return false" draggable="false">
  </div>

  <div class="topbar" id="topbar">
    <div class="logo">genzie hub</div>
    <div class="nav-pills" id="navPills">
      <a href="index.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>start</a>
      <a href="czlonkowie.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 20c0-3.3 3.1-6 7-6"/><path d="M14 20c0-2.2 1.8-4 4-4"/></svg>członkowie</a>
      <a href="galeria.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L6 19"/></svg>zdjęcia</a>
      <a href="spotkania.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>spotkania</a>
      <a href="informacje.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="8" r="1" fill="currentColor" stroke="none"/></svg>informacje</a>
    </div>
  </div>

  <div class="page-wrap">

    <div id="informacje" class="page page-content active">
      <h2>informacje 💌</h2>
      <p>Naprawdę nie jesteśmy fanami grupy Genzie.</p>
    </div>

  </div>

  <script>
    const topbar = document.getElementById('topbar');
    const SCROLL_THRESHOLD = 40;

    function updateTopbarOnScroll(){
      if (window.scrollY > SCROLL_THRESHOLD) {
        topbar.classList.add('collapsed');
      } else {
        topbar.classList.remove('collapsed');
      }
    }
    window.addEventListener('scroll', updateTopbarOnScroll, { passive: true });
    updateTopbarOnScroll();

    document.querySelectorAll('img').forEach(img => {
      img.setAttribute('draggable', 'false');
      img.addEventListener('contextmenu', e => e.preventDefault());
      img.addEventListener('dragstart', e => e.preventDefault());
    });

    document.addEventListener('contextmenu', function(e){
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    document.addEventListener('keydown', function(e){
      if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.key === 'u' || e.key === 'U')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
